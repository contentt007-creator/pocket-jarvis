<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Jarvis — Your money. Your move.</title>
  <meta name="description" content="AI-powered personal finance app for Bangladesh. Track expenses, set goals, get personalized advice from Jarvis AI.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 720px;
      text-align: center;
    }
    .logo {
      width: 180px;
      height: 180px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
    }
    h1 {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #F0B429 0%, #FFDC5E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 20px;
      color: #9CA3AF;
      margin-bottom: 12px;
      font-style: italic;
    }
    .subtitle {
      font-size: 14px;
      color: #6B7280;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s;
    }
    .link:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-2px);
    }
    .link.primary {
      background: linear-gradient(135deg, #5B4DF8 0%, #7C6BFF 100%);
      border-color: transparent;
    }
    .footer {
      margin-top: 64px;
      font-size: 12px;
      color: #4B5563;
    }
    .footer a { color: #6B7280; text-decoration: none; }
    @media (max-width: 600px) {
      h1 { font-size: 40px; }
      .tagline { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Pocket Jarvis Logo" onerror="this.style.display='none'">
    </div>
    <h1>Pocket Jarvis</h1>
    <p class="tagline">Your money. Your move.</p>
    <p class="subtitle">AI-powered personal finance for Bangladesh</p>

    <div class="links">
      <a href="privacy.html" class="link">📄 Privacy Policy</a>
      <a href="terms.html" class="link">📋 Terms of Service</a>
      <a href="mailto:contentt0077@gmail.com" class="link">📧 Support</a>
    </div>

    <div class="footer">
      © 2025 Pocket Jarvis · Made with 💜 in Bangladesh<br>
      <a href="mailto:contentt0077@gmail.com">contentt0077@gmail.com</a>
    </div>
  </div>
</body>
</html>
